name: Publish probot-chatbot
on:
  release:
    types: [published]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci --prefix packages/probot-chatbot
      - run: npm publish --prefix packages/probot-chatbot
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
